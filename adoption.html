<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Submit Adoption Request</title>

<link rel="stylesheet" href="adoption.css">
</head>
<body>

  <header class="header">
    <div class="logo">
      <img src="logo.png" alt="Logo">
    </div>
    <nav class="nav">
      <a class="active" href="index.html">Home</a>
      <a href="rescue.html">Rescue Stories</a>
      <a href="smart.html">Adopt</a>
      <a href="about.html">About</a>
      <div class="user-area">
        <a href="Login.html" id="loginBtn">Login</a>
        <div class="profile" id="profileBox" style="display: none;">
          <div class="avatar" id="avatarLetter"></div>
        </div>
      </div>
    </nav>
  </header>

  <section class="adoption-form fade">
    <div class="form-container">
      <div class="back-btn">
        <a href="smart.html">←</a>
      </div>
      
      <div class="steps">
        <div class="step active">
          <div class="circle">1</div>
          <span>Form</span>
        </div>
        <div class="line"></div>
        <div class="step">
          <div class="circle">2</div>
          <span>Confirmation</span>
        </div>
      </div>

      <h2>Submit Adoption Request</h2>

      <form id="adoptionForm">
        <div class="field">
          <label>Full Name</label>
          <input type="text" id="nameInput" placeholder="Your name" required>
        </div>

        <div class="field">
          <label>Age</label>
          <input type="number" id="ageInput" placeholder="Your age" required>
        </div>

        <div class="field">
          <label>Email</label>
          <input type="email" id="emailInput" placeholder="Your email" required>
        </div>

        <div class="field">
          <label>Phone</label>
          <input type="text" id="phoneInput" placeholder="Your phone" required>
        </div>

        <div class="field">
          <label>Why do you want to adopt?</label>
          <textarea id="reasonInput" required></textarea>
        </div>

        <div class="field">
          <label>Additional Notes</label>
          <textarea id="notesInput"></textarea>
        </div>

        <div class="check">
          <input type="checkbox" id="termsCheck" required>
          <span>I understand the responsibility</span>
        </div>

        <button type="submit">Submit Request</button>
      </form>

    </div>
  </section>

 <footer class="footer">
  <div class="footer-left">
    <p>Follow Us</p>
    <p>
      <a href="https://instagram.com" target="_blank">Instagram</a> |
      <a href="https://twitter.com" target="_blank">Twitter</a> |
      <a href="mailto:hello@secondchance.com">Email</a>
    </p>
  </div>
  <div class="footer-right">
    <p> © Project Second Chance</p>
  </div>
</footer>


  <script src="adoption.js"></script>
  <script src="script.js"></script>

</body>
</html>
