<header class="header">
  <div class="logo">
    <img src="logo.png" alt="Logo">
  </div>

  <nav class="nav">
     <a href="index.html">Home</a>
    <a href="rescue.html">Rescue Stories</a>
    <a href="smart.html">Adopt</a>
    <a href="about.html">About</a>

    <div class="user-area">
      <a href="Login.html" id="loginBtn">Login</a>

      <div class="profile" id="profileBox" style="display: none;">
        <div class="avatar" id="avatarLetter"></div>

        <div class="dropdown" id="dropdownMenu">
          <a href="profile.html">My Profile</a>
          <a href="saved.html">Saved Pets</a>

</header>

<div class="container">

  <h1>Adoption Requests</h1>

  <div class="cards">

    <div class="card">
      <h3>Total Requests</h3>
      <p id="total">0</p>
    </div>

    <div class="card">
      <h3>Pending</h3>
      <p id="pending">0</p>
    </div>

    <div class="card">
      <h3>Approved</h3>
      <p id="approved">0</p>
    </div>

    <div class="card">
      <h3>Declined</h3>
      <p id="declined">0</p>
    </div>

  </div>

  <div class="table-box">
    <table>
      <thead>
        <tr>
          <th>Applicant</th>
          <th>Pet</th>
          <th>Date</th>
          <th>Status</th>
        </tr>
      </thead>

      <tbody id="requestsTable"></tbody>

    </table>
  </div>

</div>
